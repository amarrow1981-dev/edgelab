<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gary — Football Unlocked</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #060a0e;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .gary-layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    will-change: transform;
    transition: transform 0.12s ease-out;
  }

  .gary-img {
    width: 100%;
    max-width: 520px;
    height: 100vh;
    object-fit: cover;
    object-position: top center;
    opacity: 0.7;
    animation: breathe 7s ease-in-out infinite;
    display: block;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(1.012); }
  }

  .vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, transparent 30%, #060a0e 75%),
      radial-gradient(ellipse 100% 40% at 50% 0%, #060a0e 0%, transparent 100%),
      linear-gradient(to right, #060a0e 0%, transparent 20%, transparent 80%, #060a0e 100%);
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: absolute;
    z-index: 10;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    will-change: transform;
    transition: transform 0.18s ease-out;
    animation: fadein 2.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadein {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .gary-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 130px);
    letter-spacing: 0.14em;
    color: #e8eef2;
    line-height: 1;
    margin-bottom: 6px;
  }

  .gary-sub {
    font-family: 'Barlow', sans-serif;
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: #4a9bc4;
    font-weight: 300;
    margin-bottom: 36px;
  }

  .divider {
    width: 28px;
    height: 1px;
    background: #4a9bc4;
    opacity: 0.5;
    margin-bottom: 28px;
  }

  .copy {
    font-family: 'Barlow', sans-serif;
    font-size: clamp(13px, 3vw, 15px);
    font-weight: 300;
    color: #7a8e9a;
    line-height: 1.8;
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 0.03em;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 48px;
  }

  .form input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(74,155,196,0.25);
    color: #e8eef2;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 13px 16px;
    letter-spacing: 0.04em;
    outline: none;
    border-radius: 2px;
    width: 100%;
    transition: border-color 0.2s;
  }

  .form input::placeholder { color: rgba(255,255,255,0.18); }
  .form input:focus { border-color: rgba(74,155,196,0.6); }

  .form button {
    background: transparent;
    border: 1px solid #4a9bc4;
    color: #4a9bc4;
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    padding: 13px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.25s, color 0.25s;
    width: 100%;
  }

  .form button:hover {
    background: #4a9bc4;
    color: #060a0e;
  }

  .footer {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }

  .footer span { color: rgba(74,155,196,0.45); }

  .thanks {
    display: none;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #4a9bc4;
    text-align: center;
    padding: 13px 0;
  }
</style>
</head>

  <div class="vignette"></div>

  <div class="content" id="content">
    <div class="gary-name">GARY</div>
    <div class="gary-sub">Football Unlocked</div>
    <div class="divider"></div>
    <p class="copy">We are changing the landscape<br>of sports statistics.</p>
    <div class="form" id="formWrap">
      <input type="text" id="fnameInput" placeholder="your name" />
      <input type="email" id="emailInput" placeholder="your@email.com" />
      <button onclick="handleSubmit()">Be first to know</button>
      <div class="thanks" id="thanks">You're on the list. Gary knows.</div>
    </div>
    <div class="footer">Powered by <span>EdgeLab</span></div>
  </div>

</div>

<script>
  const scene = document.getElementById('scene');
  const garyLayer = document.getElementById('garyLayer');
  const content = document.getElementById('content');

  let mx = 0, my = 0;
  let cx = 0, cy = 0;

  scene.addEventListener('mousemove', (e) => {
    const r = scene.getBoundingClientRect();
    mx = (e.clientX - r.left) / r.width - 0.5;
    my = (e.clientY - r.top) / r.height - 0.5;
  });

  scene.addEventListener('mouseleave', () => {
    mx = 0; my = 0;
  });

  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      mx = Math.max(-0.5, Math.min(0.5, (e.gamma || 0) / 30));
      my = Math.max(-0.5, Math.min(0.5, (e.beta  || 0) / 60));
    });
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick() {
    cx = lerp(cx, mx, 0.06);
    cy = lerp(cy, my, 0.06);
    garyLayer.style.transform = `translate(${cx * 18}px, ${cy * 10}px)`;
    content.style.transform   = `translate(${cx * -8}px, ${cy * -5}px)`;
    requestAnimationFrame(tick);
  }
  tick();

  function handleSubmit() {
    const email = document.getElementById('emailInput').value;
    const fname = document.getElementById('fnameInput').value;
    if (!email || !email.includes('@')) {
      document.getElementById('emailInput').focus();
      return;
    }

    // Submit to Mailchimp via hidden iframe (avoids CORS redirect)
    const MC_ACTION = 'https://garyknows.us9.list-manage.com/subscribe/post?u=fd7f71ebb01518129571bb289&id=9e8d92d1e8&f_id=0036e1e3f0';

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = MC_ACTION;
    form.target = 'mc_iframe';
    form.style.display = 'none';

    const emailField = document.createElement('input');
    emailField.name = 'EMAIL';
    emailField.value = email;
    form.appendChild(emailField);

    const fnameField = document.createElement('input');
    fnameField.name = 'FNAME';
    fnameField.value = fname;
    form.appendChild(fnameField);

    // Mailchimp honeypot — must be present and empty
    const honeypot = document.createElement('input');
    honeypot.type = 'text';
    honeypot.name = 'b_fd7f71ebb01518129571bb289_9e8d92d1e8';
    honeypot.tabIndex = -1;
    honeypot.value = '';
    form.appendChild(honeypot);

    // Hidden iframe to absorb Mailchimp's redirect response
    let iframe = document.getElementById('mc_iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = 'mc_iframe';
      iframe.id = 'mc_iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // Show success immediately
    document.getElementById('fnameInput').style.display = 'none';
    document.getElementById('emailInput').style.display = 'none';
    document.querySelector('.form button').style.display = 'none';
    document.getElementById('thanks').style.display = 'block';
  }
</script>
